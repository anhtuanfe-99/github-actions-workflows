name: Node Demo

on: push

jobs:
  inspect-node:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version-file: "package.json"

      - run: corepack enable

      - run: pnpm install --frozen-lockfile

      - run: node --version
      - run: pnpm --version
